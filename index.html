<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Journal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080c10; font-family: 'Courier New', monospace; color: #c9d1d9; min-height: 100vh; transition: background 0.2s, color 0.2s; }
  body.light { background: #f4f6f9; color: #1a1f2e; }

  header { padding: 32px 40px 20px; border-bottom: 1px solid #21262d; position: relative; }
  body.light header { border-bottom-color: #d0d7e3; }
  header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
  body.light header h1 { color: #1a1f2e; }
  .mode-toggle { position: absolute; right: 40px; top: 32px; background: #0d1117; border: 1px solid #21262d; color: #8b949e; font-family: 'Courier New', monospace; font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
  .mode-toggle:hover { color: #c9d1d9; border-color: #444; }
  body.light .mode-toggle { background: #fff; border-color: #d0d7e3; color: #1a1f2e; }

  .nav-tabs { display: flex; gap: 4px; padding: 0 40px; border-bottom: 1px solid #21262d; }
  body.light .nav-tabs { border-bottom-color: #d0d7e3; }
  .nav-tab { padding: 12px 20px; font-size: 13px; font-weight: 600; font-family: 'Courier New', monospace; cursor: pointer; border: none; background: transparent; color: #8b949e; border-bottom: 2px solid transparent; margin-bottom: -1px; letter-spacing: 0.04em; }
  .nav-tab:hover { color: #c9d1d9; }
  .nav-tab.active { color: #fff; border-bottom-color: #00e676; }
  body.light .nav-tab { color: #6b7280; }
  body.light .nav-tab:hover { color: #1a1f2e; }
  body.light .nav-tab.active { color: #1a1f2e; border-bottom-color: #00a854; }

  .page { display: none; }
  .page.active { display: block; }

  .filters { padding: 20px 40px; display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: 'Courier New', monospace; cursor: pointer; border: 1.5px solid #21262d; background: transparent; color: #8b949e; letter-spacing: 0.05em; }
  .filter-btn.active { border-color: #00e676; color: #00e676; }
  body.light .filter-btn { border-color: #d0d7e3; color: #6b7280; }
  body.light .filter-btn.active { border-color: #00a854; color: #00a854; }

  /* Dashboard */
  .dash-section { margin: 0 40px 32px; }
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
  .dash-card { background: #0d1117; border-radius: 12px; padding: 24px 28px; border: 1px solid #21262d; position: relative; overflow: hidden; }
  body.light .dash-card { background: #fff; border-color: #d0d7e3; }
  .dash-card-label { font-size: 13px; color: #8b949e; margin-bottom: 16px; font-weight: 600; }
  .dash-card-value { font-size: 42px; font-weight: 700; color: #fff; line-height: 1; margin-bottom: 8px; }
  body.light .dash-card-value { color: #1a1f2e; }
  .dash-card-value.pos { color: #00e676; }
  .dash-card-value.neg { color: #e05c5c; }
  body.light .dash-card-value.pos { color: #00a854; }
  body.light .dash-card-value.neg { color: #c0392b; }
  .dash-card-sub { font-size: 12px; color: #8b949e; }
  .dash-card-accent { position: absolute; top: 0; right: 0; width: 4px; height: 100%; }

  /* Weeks */
  .week-block { margin: 0 40px 24px; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; }
  body.light .week-block { border-color: #d0d7e3; }
  .week-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: #0d1117; cursor: pointer; user-select: none; }
  .week-header:hover { background: #111820; }
  body.light .week-header { background: #fff; }
  body.light .week-header:hover { background: #f0f2f7; }
  .week-left { display: flex; align-items: center; gap: 12px; }
  .week-toggle-icon { font-size: 12px; color: #8b949e; transition: transform 0.2s; display: inline-block; }
  .week-toggle-icon.open { transform: rotate(90deg); }
  .week-title { font-size: 14px; font-weight: 700; color: #fff; }
  body.light .week-title { color: #1a1f2e; }
  .week-dates { font-size: 11px; color: #8b949e; }
  .week-right { display: flex; gap: 24px; }
  .week-stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.06em; }
  .week-stat-value { font-size: 13px; font-weight: 700; margin-top: 1px; }
  .week-stat-value.pos { color: #00e676; }
  .week-stat-value.neg { color: #e05c5c; }
  .week-body { display: none; border-top: 1px solid #21262d; padding: 20px; }
  .week-body.open { display: block; }
  body.light .week-body { border-top-color: #d0d7e3; }

  /* Day tiles */
  .day-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .day-tile { background: #080c10; border-radius: 10px; border: 1px solid #21262d; padding: 16px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; min-height: 120px; display: flex; flex-direction: column; }
  .day-tile:hover { border-color: #444; transform: translateY(-2px); }
  .day-tile.no-trades { cursor: default; opacity: 0.4; }
  .day-tile.no-trades:hover { transform: none; border-color: #21262d; }
  .day-tile.active-day { border-color: #00e676; }
  body.light .day-tile { background: #f0f2f7; border-color: #d0d7e3; }
  body.light .day-tile:hover { border-color: #aab4c8; }
  body.light .day-tile.active-day { border-color: #00a854; }
  .day-tile-name { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .day-tile-date { font-size: 12px; color: #c9d1d9; font-weight: 700; margin-bottom: 12px; }
  body.light .day-tile-date { color: #1a1f2e; }
  .day-tile-setups { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .day-tile-setup-badge { font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: 600; display: inline-block; }
  .badge-fbd { background: rgba(181,123,238,0.15); color: #b57bee; border: 1px solid rgba(181,123,238,0.3); }
  .badge-reclaim { background: rgba(0,230,118,0.1); color: #00e676; border: 1px solid rgba(0,230,118,0.2); }
  .badge-bounce { background: rgba(55,138,221,0.1); color: #378ADD; border: 1px solid rgba(55,138,221,0.2); }
  body.light .badge-fbd { background: rgba(139,92,246,0.1); color: #8b5cf6; border-color: rgba(139,92,246,0.3); }
  body.light .badge-reclaim { background: rgba(0,168,84,0.1); color: #00a854; border-color: rgba(0,168,84,0.2); }
  .day-tile-pnl { font-size: 13px; font-weight: 700; margin-top: auto; padding-top: 10px; }
  .day-tile-pnl.pos { color: #00e676; }
  .day-tile-pnl.neg { color: #e05c5c; }
  body.light .day-tile-pnl.pos { color: #00a854; }
  body.light .day-tile-pnl.neg { color: #c0392b; }

  /* Drill view */
  .drill-view { display: none; margin-top: 20px; border-top: 1px solid #21262d; padding-top: 20px; }
  .drill-view.open { display: block; }
  body.light .drill-view { border-top-color: #d0d7e3; }
  .drill-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 16px; }
  body.light .drill-title { color: #1a1f2e; }
  .drill-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; }

  /* Trade cards */
  .card { background: #0d1117; border-radius: 10px; padding: 20px 24px; border-left: 3px solid #00e676; }
  .card.loss { border-left-color: #e05c5c; }
  body.light .card { background: #fff; border-left-color: #00a854; }
  body.light .card.loss { border-left-color: #c0392b; }
  .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-price { font-size: 22px; font-weight: 700; color: #00e676; }
  .card.loss .card-price { color: #e05c5c; }
  body.light .card-price { color: #00a854; }
  body.light .card.loss .card-price { color: #c0392b; }
  .card-label { font-size: 13px; color: #c9d1d9; margin-left: 8px; }
  body.light .card-label { color: #1a1f2e; }
  .card-timestamp { font-size: 11px; color: #8b949e; }
  .badge { display: inline-block; margin-top: 8px; padding: 2px 10px; border: 1.5px solid #b57bee; border-radius: 6px; color: #b57bee; font-size: 11px; font-weight: 600; }
  body.light .badge { border-color: #8b5cf6; color: #8b5cf6; }
  .time-row { margin: 12px 0; padding-bottom: 12px; border-bottom: 1px solid #21262d; }
  body.light .time-row { border-bottom-color: #d0d7e3; }
  .time-row-inner { display: flex; gap: 6px; flex-wrap: wrap; }
  .time-chip { padding: 3px 8px; background: #080c10; border-radius: 4px; font-size: 10px; color: #8b949e; }
  body.light .time-chip { background: #f0f2f7; }
  .time-chip span { color: #c9d1d9; font-weight: 700; }
  body.light .time-chip span { color: #1a1f2e; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px 8px; margin-bottom: 12px; }
  .field-label { font-size: 10px; color: #8b949e; margin-bottom: 2px; }
  .field-value { font-size: 13px; font-weight: 700; color: #c9d1d9; }
  body.light .field-value { color: #1a1f2e; }
  .field-value.win { color: #00e676; }
  .field-value.loss { color: #e05c5c; }
  body.light .field-value.win { color: #00a854; }
  body.light .field-value.loss { color: #c0392b; }
  .sub { font-size: 10px; color: #8b949e; font-weight: 400; }
  .targets-inner { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .tp-btn { flex: 1; min-width: 70px; padding: 7px 4px; border-radius: 6px; font-size: 11px; font-weight: 700; text-align: center; font-family: 'Courier New', monospace; background: transparent; line-height: 1.5; position: relative; cursor: default; }
  .tp-hit { border: 1.5px solid #00e676; color: #00e676; }
  .tp-eod { border: 1.5px solid #f0a500; color: #f0a500; }
  .tp-stopped { border: 1.5px solid #e05c5c; color: #e05c5c; }
  .tp-miss { border: 1.5px solid #444; color: #8b949e; }
  body.light .tp-hit { border-color: #00a854; color: #00a854; }
  body.light .tp-stopped { border-color: #c0392b; color: #c0392b; }
  .tp-return { font-size: 9px; font-weight: 400; display: block; }
  .tp-tooltip { display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid #21262d; border-radius: 4px; padding: 3px 8px; font-size: 10px; color: #c9d1d9; white-space: nowrap; z-index: 10; }
  .tp-btn:hover .tp-tooltip { display: block; }
  .divider { border: none; border-top: 1px solid #21262d; margin: 12px 0; }
  body.light .divider { border-top-color: #d0d7e3; }
  .card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
  .footer-label { font-size: 11px; color: #8b949e; }
  .pts { font-size: 20px; font-weight: 700; color: #00e676; display: block; text-align: right; }
  .pts.neg { color: #e05c5c; }
  .dollars { font-size: 16px; font-weight: 700; color: #00e676; display: block; text-align: right; }
  .dollars.neg { color: #e05c5c; }
  body.light .pts { color: #00a854; }
  body.light .pts.neg { color: #c0392b; }
  body.light .dollars { color: #00a854; }
  body.light .dollars.neg { color: #c0392b; }
  .journal-toggle { margin-top: 12px; background: none; border: none; color: #8b949e; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; padding: 0; }
  .journal-toggle:hover { color: #c9d1d9; }
  .journal-body { display: none; margin-top: 10px; font-size: 11px; color: #8b949e; line-height: 1.75; border-left: 2px solid #21262d; padding-left: 12px; }
  .journal-body.open { display: block; }
  .chart-img { width: 100%; border-radius: 6px; margin-top: 10px; border: 1px solid #21262d; cursor: zoom-in; }
  .img-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); z-index: 999; align-items: center; justify-content: center; cursor: zoom-out; }
  .img-overlay.open { display: flex; }
  .img-overlay img { max-width: 90%; max-height: 90%; border-radius: 8px; border: 1px solid #21262d; }

  /* P&L Calendar */
  .cal-section { margin: 40px 40px 20px; }
  .cal-section-title { font-size: 15px; font-weight: 700; color: #fff; padding: 20px 0 16px; border-bottom: 1px solid #21262d; margin-bottom: 20px; }
  body.light .cal-section-title { color: #1a1f2e; border-bottom-color: #d0d7e3; }
  .cal-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .cal-nav-btn { background: transparent; border: 1px solid #21262d; color: #8b949e; font-family: 'Courier New', monospace; font-size: 13px; padding: 4px 12px; border-radius: 6px; cursor: pointer; }
  .cal-nav-btn:hover { border-color: #444; color: #c9d1d9; }
  body.light .cal-nav-btn { border-color: #d0d7e3; color: #6b7280; }
  .cal-month-label { font-size: 15px; font-weight: 700; color: #fff; min-width: 140px; text-align: center; }
  body.light .cal-month-label { color: #1a1f2e; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-size: 10px; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.08em; }
  .cal-dow.normal { color: #8b949e; }
  .cal-dow.total { color: #b57bee; }
  body.light .cal-dow.total { color: #8b5cf6; }
  .cal-cell { background: #0d1117; border-radius: 6px; min-height: 80px; padding: 8px; border: 1px solid #21262d; position: relative; }
  body.light .cal-cell { background: #fff; border-color: #d0d7e3; }
  .cal-cell.empty { background: transparent; border-color: transparent; min-height: 80px; }
  .cal-cell.today { border-color: #8b949e; }
  .cal-cell.week-total-cell { border-color: rgba(181,123,238,0.3); }
  body.light .cal-cell.week-total-cell { border-color: rgba(139,92,246,0.3); }
  .cal-cell.green-bg { background: rgba(0,230,118,0.08); border-color: rgba(0,230,118,0.25); }
  .cal-cell.red-bg { background: rgba(224,92,92,0.08); border-color: rgba(224,92,92,0.25); }
  body.light .cal-cell.green-bg { background: rgba(0,168,84,0.07); border-color: rgba(0,168,84,0.3); }
  body.light .cal-cell.red-bg { background: rgba(192,57,43,0.07); border-color: rgba(192,57,43,0.3); }
  .cal-cell.week-green { background: rgba(0,230,118,0.05); border-color: rgba(181,123,238,0.4); }
  .cal-cell.week-red { background: rgba(224,92,92,0.05); border-color: rgba(181,123,238,0.4); }
  .cal-day-num { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .cal-cell.has-trades .cal-day-num { color: #c9d1d9; font-weight: 700; }
  body.light .cal-cell.has-trades .cal-day-num { color: #1a1f2e; }
  .cal-week-label { font-size: 10px; color: #b57bee; font-weight: 700; margin-bottom: 4px; }
  body.light .cal-week-label { color: #8b5cf6; }
  .cal-pnl { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
  .cal-pnl.pos { color: #00e676; }
  .cal-pnl.neg { color: #e05c5c; }
  body.light .cal-pnl.pos { color: #00a854; }
  body.light .cal-pnl.neg { color: #c0392b; }
  .cal-meta { font-size: 9px; color: #8b949e; line-height: 1.6; }

  /* Timeline popup — shown only on hover via JS */
  .cal-timeline-popup { display: none; position: fixed; background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 12px 14px; z-index: 9999; width: 260px; pointer-events: none; box-shadow: 0 4px 24px rgba(0,0,0,0.7); }
  body.light .cal-timeline-popup { background: #fff; border-color: #d0d7e3; }
  .cal-timeline-popup-title { font-size: 10px; color: #8b949e; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .cal-timeline-track { position: relative; height: 32px; width: 100%; }
  .cal-timeline-line { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #21262d; transform: translateY(-50%); }
  body.light .cal-timeline-line { background: #d0d7e3; }
  .cal-timeline-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%, -50%); }
  .cal-timeline-dot.entry { background: #00e676; }
  .cal-timeline-dot.exit { background: #e05c5c; }
  .cal-timeline-ticks { display: flex; justify-content: space-between; margin-top: 4px; }
  .cal-timeline-tick { font-size: 8px; color: #8b949e; }

  /* Macro section */
  .macro-section { margin: 20px 40px 60px; }
  .macro-title { font-size: 15px; font-weight: 700; color: #fff; padding: 20px 0 16px; border-bottom: 1px solid #21262d; margin-bottom: 20px; }
  body.light .macro-title { color: #1a1f2e; border-bottom-color: #d0d7e3; }
  .macro-week-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .macro-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .macro-card { background: #0d1117; border-radius: 8px; padding: 14px 16px; border-left: 3px solid #21262d; }
  body.light .macro-card { background: #fff; }
  .macro-card.high   { border-left-color: #ef4444; }
  .macro-card.medium { border-left-color: #f0a500; }
  .macro-card.low    { border-left-color: #8b949e; }
  .macro-card-name { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  body.light .macro-card-name { color: #1a1f2e; }
  .macro-card-day  { font-size: 11px; color: #c9d1d9; margin-bottom: 2px; }
  body.light .macro-card-day { color: #374151; }
  .macro-card-time { font-size: 10px; color: #8b949e; margin-bottom: 8px; }
  .macro-card-impact { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
  .impact-high   { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
  .impact-medium { background: rgba(240,165,0,0.12); color: #f0a500; border: 1px solid rgba(240,165,0,0.25); }
  .impact-low    { background: rgba(139,148,158,0.12); color: #8b949e; border: 1px solid rgba(139,148,158,0.25); }
  .macro-card-note { font-size: 10px; color: #8b949e; margin-top: 6px; }

  /* Setups page */
  .setup-cal-section { margin: 40px 40px 20px; }
  .setup-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .setup-cal-dow { text-align: center; font-size: 10px; color: #8b949e; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.08em; }
  .setup-cal-cell { background: #0d1117; border-radius: 6px; min-height: 80px; padding: 8px; border: 1px solid #21262d; cursor: default; }
  body.light .setup-cal-cell { background: #fff; border-color: #d0d7e3; }
  .setup-cal-cell.has-setups { cursor: pointer; border-color: rgba(181,123,238,0.3); background: rgba(181,123,238,0.04); }
  .setup-cal-cell.has-setups:hover { border-color: #b57bee; }
  .setup-cal-cell.active-setup-day { border-color: #b57bee; background: rgba(181,123,238,0.1); }
  .setup-cal-cell.empty { background: transparent; border-color: transparent; }
  .setup-cal-day-num { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
  .setup-cal-cell.has-setups .setup-cal-day-num { color: #c9d1d9; font-weight: 700; }
  body.light .setup-cal-cell.has-setups .setup-cal-day-num { color: #1a1f2e; }
  .setup-cal-badge-count { font-size: 10px; color: #b57bee; font-weight: 700; margin-bottom: 4px; }
  .setup-cal-titles { font-size: 9px; color: #8b949e; line-height: 1.6; }
  .setup-drill { display: none; margin: 0 40px 60px; }
  .setup-drill.open { display: block; }
  .setup-drill-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 20px; padding-top: 24px; border-top: 1px solid #21262d; }
  body.light .setup-drill-title { color: #1a1f2e; border-top-color: #d0d7e3; }
  .setup-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .setup-card { background: #0d1117; border-radius: 10px; padding: 20px 24px; border-left: 3px solid #b57bee; }
  body.light .setup-card { background: #fff; }
  .setup-card.priority-aplus { border-left-color: #00e676; }
  .setup-card.priority-a { border-left-color: #f0a500; }
  .setup-card.priority-b { border-left-color: #8b949e; }
  body.light .setup-card.priority-aplus { border-left-color: #00a854; }
  .setup-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }

  if (s === "hit") return "tp-hit";
  if (s === "eod") return "tp-eod";
  if (s === "stopped") return "tp-stopped";

}
function scLabel(t) {
  if (t.status === "hit") return t.label + " HIT";
  if (t.status === "eod") return t.label + " EOD " + t.exitPrice;
  if (t.status === "stopped") return t.label + " STOPPED";

}

  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  document.getElementById(pageId).classList.add("active");
  btn.classList.add("active");
}

    "<div class='targets-inner'>" + tps + "</div><hr class='divider'>" +
    "<div class='card-footer'><div class='footer-label'>" + tr.exitNote + "</div><div><span class='pts" + (tr.totalPts < 0 ? " neg" : "") + "'>" + pStr + "</span><span class='dollars" + (tr.totalPnl < 0 ? " neg" : "") + "'>" + dStr + "</span></div></div>" +
    toggle + "</div>";
}

function setupBadge(setup) {
  if (setup === "FBD") return "<span class='day-tile-setup-badge badge-fbd'>FBD</span>";
  if (setup === "LEVEL_RECLAIM") return "<span class='day-tile-setup-badge badge-reclaim'>LEVEL RECLAIM</span>";
  return "<span class='day-tile-setup-badge badge-bounce'>SUPPORT BOUNCE</span>";
}

function renderAll(list) {
  var html = "";
  for (var w = 0; w < weeks.length; w++) {
    var week = weeks[w]; var wt = [];
    for (var i = 0; i < list.length; i++) for (var d = 0; d < week.days.length; d++) if (list[i].date === week.days[d].date) { wt.push(list[i]); break; }
    var wp = 0; var ww = 0;
    for (var i = 0; i < wt.length; i++) { wp += wt[i].totalPnl; if (wt[i].result === "win") ww++; }
    var wr = wt.length ? Math.round(ww/wt.length*100) + "%" : "--";
    var wps = wt.length ? (wp >= 0 ? "+$" : "-$") + Math.abs(wp).toFixed(2) : "--";
    var wpc = wp >= 0 ? "pos" : "neg";
    var dayTiles = "<div class='day-row'>";
    for (var d = 0; d < week.days.length; d++) {
      var day = week.days[d]; var dt = []; var dp = 0;
      for (var i = 0; i < wt.length; i++) if (wt[i].date === day.date) dt.push(wt[i]);
      for (var i = 0; i < dt.length; i++) dp += dt[i].totalPnl;
      if (dt.length === 0) {
        dayTiles += "<div class='day-tile no-trades'><div class='day-tile-name'>" + day.name + "</div><div class='day-tile-date'>" + day.date.slice(0,5) + "</div></div>";
      } else {
        var seen = {}; var badges = "";
        for (var i = 0; i < dt.length; i++) { if (!seen[dt[i].tradeLabel]) { seen[dt[i].tradeLabel] = true; badges += setupBadge(dt[i].setup) + "<span style='font-size:9px;color:#8b949e;margin-left:4px;'>" + dt[i].tradeLabel + "</span><br>"; } }
        var dps = (dp >= 0 ? "+$" : "-$") + Math.abs(dp).toFixed(2);
        dayTiles += "<div class='day-tile has-trades' id='tile-" + week.num + "-" + day.date.replace(/\//g,"-") + "' onclick='openDrillDown(" + week.num + ",\"" + day.date + "\")'><div class='day-tile-name'>" + day.name + "</div><div class='day-tile-date'>" + day.date.slice(0,5) + "</div><div class='day-tile-setups'>" + badges + "</div><div class='day-tile-pnl " + (dp >= 0 ? "pos" : "neg") + "'>" + dps + "</div></div>";
      }
    }
    dayTiles += "</div>";
    html += "<div class='week-block'><div class='week-header' onclick='toggleWeek(" + week.num + ")'><div class='week-left'><span class='week-toggle-icon' id='icon-" + week.num + "'>&#9658;</span><span class='week-title'>" + week.label + "</span><span class='week-dates'>" + week.dates + "</span></div><div class='week-right'><div class='week-stat'><div class='week-stat-label'>P&amp;L</div><div class='week-stat-value " + wpc + "'>" + wps + "</div></div><div class='week-stat'><div class='week-stat-label'>Win Rate</div><div class='week-stat-value " + wpc + "'>" + wr + "</div></div><div class='week-stat'><div class='week-stat-label'>Trades</div><div class='week-stat-value'>" + wt.length + "</div></div></div></div><div class='week-body' id='week-" + week.num + "'>" + dayTiles + "<div class='drill-view' id='drill-" + week.num + "'></div></div></div>";
  }
  document.getElementById("journal").innerHTML = html;
}

function toggleWeek(num) {
  var b = document.getElementById("week-" + num); var ic = document.getElementById("icon-" + num);
  if (b.classList.contains("open")) { b.classList.remove("open"); ic.classList.remove("open"); }
  else { b.classList.add("open"); ic.classList.add("open"); }
}

function openDrillDown(weekNum, date) {
  var list = getFilteredTrades(); var dt = [];
  for (var i = 0; i < list.length; i++) if (list[i].date === date) dt.push(list[i]);
  if (!dt.length) return;
  var tiles = document.querySelectorAll(".day-tile");
  for (var i = 0; i < tiles.length; i++) tiles[i].classList.remove("active-day");
  var tile = document.getElementById("tile-" + weekNum + "-" + date.replace(/\//g,"-"));
  if (tile) tile.classList.add("active-day");
  var cards = "";
  for (var i = 0; i < dt.length; i++) cards += renderCard(dt[i]);
  var drill = document.getElementById("drill-" + weekNum);
  drill.innerHTML = "<div class='drill-title'>" + date + " — Trade Cards</div><div class='drill-cards'>" + cards + "</div>";
  drill.classList.add("open");
}

function filterTrades(type, btn) {
  var btns = document.querySelectorAll(".filter-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  btn.classList.add("active"); currentFilter = type;
  renderAll(getFilteredTrades());
}

function toggleJournal(id) {
  var el = document.getElementById("journal-" + id); var open = el.classList.contains("open");
  var all = document.querySelectorAll(".journal-body");
  for (var i = 0; i < all.length; i++) all[i].classList.remove("open");
  if (!open) el.classList.add("open");
}

function openImg(src) { document.getElementById("overlay-img").src = src; document.getElementById("img-overlay").classList.add("open"); }
function closeImg() { document.getElementById("img-overlay").classList.remove("open"); }

function renderDashboard() {
  var total = 0, count = 0, wins = 0;
  for (var i = 0; i < trades.length; i++) { total += trades[i].totalPnl; count++; if (trades[i].result === "win") wins++; }
  var wr = count ? Math.round(wins/count*100) : 0;
  var days = Object.keys(getDayMap()).length;
  var cards = [
    {label:"Total P&L", value:(total>=0?"+$":"-$")+Math.abs(total).toFixed(2), cls:total>=0?"pos":"neg", sub:count+" trades across "+days+" trading days", accent:total>=0?"#00e676":"#e05c5c"},
    {label:"Win Rate", value:wr+"%", cls:wr>=50?"pos":"neg", sub:wins+" wins &bull; "+(count-wins)+" losses", accent:wr>=50?"#00e676":"#e05c5c"},
    {label:"Total Trades", value:count, cls:"", sub:"Across "+days+" active trading days", accent:"#b57bee"},
    {label:"Winning Trades", value:wins, cls:"pos", sub:(count-wins)+" losing trade"+(count-wins!==1?"s":""), accent:"#00e676"}
  ];
  var html = "<div class='dash-grid'>";
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    html += "<div class='dash-card'><div class='dash-card-accent' style='background:" + c.accent + ";'></div><div class='dash-card-label'>" + c.label + "</div><div class='dash-card-value" + (c.cls ? " " + c.cls : "") + "'>" + c.value + "</div><div class='dash-card-sub'>" + c.sub + "</div></div>";
  }
  html += "</div>";
  document.getElementById("dash-section").innerHTML = html;
}

// Calendar
function timeToOffset(timeStr) {
  var p = timeStr.split(" "); var hm = p[0].split(":"); var h = parseInt(hm[0]); var m = parseInt(hm[1]); var ampm = p[1];
  if (ampm === "PM" && h !== 12) h += 12; if (ampm === "AM" && h === 12) h = 0;
  var diff = (h * 60 + m) - 18 * 60; if (diff < 0) diff += 24 * 60;
  return diff / (24 * 60);
}

function buildDayTradingMap() {
  var map = {};
  for (var i = 0; i < trades.length; i++) {
    var t = trades[i]; var parts = t.date.split("/");
    var key = parts[2] + "-" + parts[0] + "-" + parts[1];
    if (!map[key]) map[key] = { pnl:0, count:0, wins:0, dateStr:t.date };
    map[key].pnl += t.totalPnl; map[key].count++;
    if (t.result === "win") map[key].wins++;
  }
  return map;
}

var activePopupCell = null;

function showTimeline(dateStr, cellEl) {
  var events = timelineEvents[dateStr];
  if (!events || !events.length) return;
  var popup = document.getElementById("cal-timeline-popup");
  document.getElementById("cal-timeline-title").textContent = dateStr + " — 6PM to 6PM";
  var posMap = {};
  for (var i = 0; i < events.length; i++) {
    var pct = Math.round(timeToOffset(events[i].time) * 100);
    if (!posMap[pct]) posMap[pct] = [];
    posMap[pct].push(events[i]);
  }
  var dots = "";
  for (var key in posMap) {
    var group = posMap[key];
    for (var j = 0; j < group.length; j++) {
      var top = 50 + (j - (group.length - 1) / 2) * 12;
      dots += "<div class='cal-timeline-dot " + group[j].type + "' style='left:" + key + "%;top:" + top + "%;'></div>";
    }
  }
  document.getElementById("cal-timeline-dots").innerHTML = dots;
  var rect = cellEl.getBoundingClientRect();
  popup.style.display = "block";
  popup.style.left = (rect.left + rect.width / 2 - 130) + "px";
  popup.style.top = (rect.top + window.scrollY - popup.offsetHeight - 10) + "px";
  activePopupCell = cellEl;
}

function hideTimeline() { document.getElementById("cal-timeline-popup").style.display = "none"; activePopupCell = null; }

function renderCalendar() {
  var map = buildDayTradingMap();
  document.getElementById("cal-month-label").textContent = monthNames[calMonth] + " " + calYear;
  var firstDow = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  var today = new Date();
  var html = "";
  var dows = ["Sun","Mon","Tue","Wed","Thu","Fri","Week Total"];
  for (var d = 0; d < 7; d++) html += "<div class='cal-dow " + (d===6?"total":"normal") + "'>" + dows[d] + "</div>";
  var col = firstDow === 6 ? 0 : firstDow;
  for (var e = 0; e < col; e++) html += "<div class='cal-cell empty'></div>";
  var wPnl=0, wCnt=0, wWins=0;
  for (var day = 1; day <= daysInMonth; day++) {
    var jsDate = new Date(calYear, calMonth, day);
    var dow = jsDate.getDay();
    if (dow === 6) continue;
    var mm = String(calMonth+1).padStart(2,"0"); var dd = String(day).padStart(2,"0");
    var key = calYear + "-" + mm + "-" + dd;
    var dateStr = mm + "/" + dd + "/" + calYear;
    var data = map[key];
    var isToday = (today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===day);
    var hasTimeline = timelineEvents[dateStr] && timelineEvents[dateStr].length > 0;
    var hoverAttr = hasTimeline ? " onmouseenter='showTimeline(\"" + dateStr + "\",this)' onmouseleave='hideTimeline()'" : "";
    if (data) {
      wPnl += data.pnl; wCnt += data.count; wWins += data.wins;
      var pnlStr = (data.pnl>=0?"+$":"-$")+Math.abs(data.pnl).toFixed(2);
      var bg = data.pnl>=0?" green-bg":" red-bg";
      var wr = Math.round(data.wins/data.count*100);
      html += "<div class='cal-cell has-trades" + bg + (isToday?" today":"") + "'" + hoverAttr + "><div class='cal-day-num'>" + day + "</div><div class='cal-pnl " + (data.pnl>=0?"pos":"neg") + "'>" + pnlStr + "</div><div class='cal-meta'>Trades: " + data.count + "<br>Win%: " + wr + "</div></div>";
    } else {
      html += "<div class='cal-cell" + (isToday?" today":"") + "'" + hoverAttr + "><div class='cal-day-num'>" + day + "</div></div>";
    }
    if (dow === 5) {
      var wtBg = wCnt > 0 ? (wPnl>=0?" week-green":" week-red") : "";
      if (wCnt > 0) {
        var ws = (wPnl>=0?"+$":"-$")+Math.abs(wPnl).toFixed(2);
        html += "<div class='cal-cell week-total-cell" + wtBg + "'><div class='cal-week-label'>WEEK</div><div class='cal-pnl " + (wPnl>=0?"pos":"neg") + "'>" + ws + "</div><div class='cal-meta'>Trades: " + wCnt + "<br>Win%: " + Math.round(wWins/wCnt*100) + "</div></div>";
      } else html += "<div class='cal-cell week-total-cell'><div class='cal-week-label'>WEEK</div></div>";
      wPnl=0; wCnt=0; wWins=0;
    }
  }
  var lastDow = new Date(calYear, calMonth, daysInMonth).getDay();
  if (lastDow !== 5 && lastDow !== 6) {
    for (var r = 0; r < 5 - lastDow; r++) html += "<div class='cal-cell empty'></div>";
    var wtBg2 = wCnt>0?(wPnl>=0?" week-green":" week-red"):"";
    if (wCnt > 0) { var ws2 = (wPnl>=0?"+$":"-$")+Math.abs(wPnl).toFixed(2); html += "<div class='cal-cell week-total-cell" + wtBg2 + "'><div class='cal-week-label'>WEEK</div><div class='cal-pnl " + (wPnl>=0?"pos":"neg") + "'>" + ws2 + "</div><div class='cal-meta'>Trades: " + wCnt + "<br>Win%: " + Math.round(wWins/wCnt*100) + "</div></div>"; }
    else html += "<div class='cal-cell week-total-cell'><div class='cal-week-label'>WEEK</div></div>";
  }
  document.getElementById("cal-grid").innerHTML = html;
}

function prevMonth() { calMonth--; if (calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function nextMonth() { calMonth++; if (calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

// Macro section
function renderMacroSection() {
  var now = new Date();
  var sun = new Date(now); sun.setDate(now.getDate() - now.getDay()); sun.setHours(0,0,0,0);
  var sat = new Date(sun); sat.setDate(sun.getDate() + 6); sat.setHours(23,59,59,999);
  var evts = [];
  for (var i = 0; i < macroEvents.length; i++) {
    var p = macroEvents[i].date.split("/");
    var d = new Date(parseInt(p[2]), parseInt(p[0])-1, parseInt(p[1]));
    if (d >= sun && d <= sat) evts.push(macroEvents[i]);
  }
  function fmt(d) { return (d.getMonth()+1) + "/" + d.getDate(); }
  document.getElementById("macro-week-label").textContent = "Week of " + fmt(sun) + " — " + fmt(sat) + ", " + sat.getFullYear();
  var grid = document.getElementById("macro-grid");
  if (!evts.length) { grid.innerHTML = "<div style='color:#8b949e;font-size:13px;'>No major data releases this week.</div>"; return; }
  var html = "";
  for (var i = 0; i < evts.length; i++) {
    var ev = evts[i]; var p2 = ev.date.split("/");
    var d2 = new Date(parseInt(p2[2]), parseInt(p2[0])-1, parseInt(p2[1]));
    html += "<div class='macro-card " + ev.impact + "'><div class='macro-card-name'>" + ev.name + "</div><div class='macro-card-day'>" + dayNames[d2.getDay()] + ", " + (d2.getMonth()+1) + "/" + d2.getDate() + "</div><div class='macro-card-time'>" + ev.time + "</div><div class='macro-card-impact impact-" + ev.impact + "'>" + ev.impact + " impact</div><div class='macro-card-note'>" + ev.note + "</div></div>";
  }
  grid.innerHTML = html;
}

// Setups calendar
function renderSetupCalendar() {
  var map = {};
  for (var i = 0; i < setupDays.length; i++) map[setupDays[i].date] = setupDays[i];
  document.getElementById("setup-cal-month-label").textContent = monthNames[setupCalMonth] + " " + setupCalYear;
  var firstDow = new Date(setupCalYear, setupCalMonth, 1).getDay();
  var daysInMonth = new Date(setupCalYear, setupCalMonth+1, 0).getDate();
  var html = "";
  var dows2 = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  for (var d = 0; d < 7; d++) html += "<div class='setup-cal-dow'>" + dows2[d] + "</div>";
  for (var e = 0; e < firstDow; e++) html += "<div class='setup-cal-cell empty'></div>";
  for (var day = 1; day <= daysInMonth; day++) {
    var mm = String(setupCalMonth+1).padStart(2,"0"); var dd = String(day).padStart(2,"0");
    var dateStr2 = mm + "/" + dd + "/" + setupCalYear;
    var data2 = map[dateStr2];
    if (data2) {
      var titles = "";
      for (var i = 0; i < data2.setups.length; i++) titles += data2.setups[i].level + " " + data2.setups[i].type + "<br>";
      html += "<div class='setup-cal-cell has-setups' id='setup-cell-" + dateStr2.replace(/\//g,"-") + "' onclick='openSetupDrill(\"" + dateStr2 + "\")'><div class='setup-cal-day-num'>" + day + "</div><div class='setup-cal-badge-count'>" + data2.setups.length + " setup" + (data2.setups.length>1?"s":"") + "</div><div class='setup-cal-titles'>" + titles + "</div></div>";
    } else {
      html += "<div class='setup-cal-cell'><div class='setup-cal-day-num'>" + day + "</div></div>";
    }
  }
  document.getElementById("setup-cal-grid").innerHTML = html;
}

function openSetupDrill(dateStr) {
  var map = {}; for (var i = 0; i < setupDays.length; i++) map[setupDays[i].date] = setupDays[i];
  var data = map[dateStr]; if (!data) return;
  var cells = document.querySelectorAll(".setup-cal-cell");
  for (var i = 0; i < cells.length; i++) cells[i].classList.remove("active-setup-day");
  var cell = document.getElementById("setup-cell-" + dateStr.replace(/\//g,"-"));
  if (cell) cell.classList.add("active-setup-day");
  var cards = "";
  for (var i = 0; i < data.setups.length; i++) {
    var s = data.setups[i];
    var pl = s.priority === "aplus" ? "A+" : s.priority === "a" ? "A" : "B";
    cards += "<div class='setup-card priority-" + s.priority + "'><div class='setup-card-header'><div class='setup-card-level'>" + s.level + "</div><div class='setup-card-priority'>" + pl + "</div></div><div class='setup-card-type'>" + s.type + "</div><div class='setup-card-notes-label'>Notes</div><div class='setup-card-notes'>" + s.notes + "</div></div>";
  }
  var drill = document.getElementById("setup-drill");
  drill.innerHTML = "<div class='setup-drill-title'>" + dateStr + " — Pre-Market Setups</div><div class='setup-cards-grid'>" + cards + "</div>";
  drill.classList.add("open");
}

function prevSetupMonth() { setupCalMonth--; if(setupCalMonth<0){setupCalMonth=11;setupCalYear--;} renderSetupCalendar(); }
function nextSetupMonth() { setupCalMonth++; if(setupCalMonth>11){setupCalMonth=0;setupCalYear++;} renderSetupCalendar(); }

function toggleMode() {
  var body = document.body; var btn = document.getElementById("mode-btn");
  if (body.classList.contains("light")) { body.classList.remove("light"); btn.textContent = "☀ Light Mode"; }
  else { body.classList.add("light"); btn.textContent = "☾ Dark Mode"; }
}

renderDashboard();
renderAll(getFilteredTrades());
renderCalendar();
renderSetupCalendar();
renderMacroSection();
</script>
